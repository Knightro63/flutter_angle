name: LibEGL
description: Clang-safe DynamicLibrary bindings for EGL and OpenGLES APIs.
output: 'lib/src/egl_bindings.dart'

# Point ffigen directly to your homebrew installation directory
llvm-path:
  - '/opt/homebrew/opt/llvm'

ffi-native:
  asset-id: 'package:flutter_angle/libegl'

comments:
  style: any       # Options: 'any' (grabs all) or 'doxygen' (grabs structured text)
  length: full     # Options: 'full' (all lines) or 'brief' (first sentence only)

headers:
  entry-points:
    - '../flutter_angle_darwin/darwin/flutter_angle_darwin/Frameworks/libEGL.xcframework/ios-arm64/libEGL.framework/Headers/libEGL.h'
  include-directives:
    - '**/libEGL.h'
    - '**/egl.h'
    - '**/eglext.h'
    - '**/eglext_angle.h'
    - '**/eglplatform.h'

# FIX: Informs Clang where to resolve the nested internal platform headers
compiler-opts:
  - '-I../flutter_angle_darwin/darwin/flutter_angle_darwin/Frameworks/libEGL.xcframework/ios-arm64/libEGL.framework/Headers'
  - '-I../flutter_angle_darwin/darwin/flutter_angle_darwin/Frameworks/libEGL.xcframework/ios-arm64/libEGL.framework'
  - '-F../flutter_angle_darwin/darwin/flutter_angle_darwin/Frameworks/libEGL.xcframework/ios-arm64'
  - '-isysroot /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneSimulator.platform/Developer/SDKs/iPhoneSimulator.sdk'

functions:
  include:
    - 'egl.*'
    - 'gl.*'
    - 'makeCurrent'
    - 'pinAddress'

macros:
  include:
    - 'GL_.*'
    - 'EGL_.*'

unnamed-enums:
  include:
    - 'GL_.*'
    - 'EGL_.*'

# forcing ffigen to fall back to primitive ffi.Uint32 and ffi.Int32 maps
typedefs:
  exclude:
    - 'GLuint'
    - 'GLsizei'
    - 'GLenum'

library-imports:
  ffi_custom_handle: 'dart:ffi'

# 3. FIXED: Points 'lib:' directly to the matching 'ffi_custom_handle' alias defined above.
type-map:
  typedefs:
    'GLuint':
      lib: 'ffi_custom_handle'
      c-type: 'Uint32'
      dart-type: 'int'
    'GLsizei':
      lib: 'ffi_custom_handle'
      c-type: 'Int32'
      dart-type: 'int'
    'GLenum':
      lib: 'ffi_custom_handle'
      c-type: 'Uint32'
      dart-type: 'int'